<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../static/style.css">
    <script src="../static/animation.js"></script>
    <title>Change Password - MiniDiscDB</title>
    <style>
        .password-container {
            max-width: 600px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .password-card {
            background: #1e1e1e;
            border: 1px solid #444;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .password-card h1 {
            margin: 0 0 30px 0;
            font-size: 32px;
            color: #fff;
            text-align: center;
            border-bottom: 2px solid #007bff;
            padding-bottom: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #fff;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #444;
            border-radius: 8px;
            background-color: #2d2d2d;
            color: #fff;
            font-family: Arial, sans-serif;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 8px rgba(0, 123, 255, 0.3);
        }

        .form-group input::placeholder {
            color: #9aa3b2;
        }

        .password-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .form-buttons {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        .form-buttons .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            margin: 0;
        }

        .form-buttons .btn-submit {
            background: #007bff;
            color: #fff;
        }

        .form-buttons .btn-submit:hover {
            background: #0056b3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 123, 255, 0.3);
        }

        .form-buttons .btn-cancel {
            background: #6c757d;
            color: #fff;
        }

        .form-buttons .btn-cancel:hover {
            background: #5a6268;
            transform: translateY(-2px);
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 600;
            text-align: center;
            animation: slideDown 0.3s ease;
        }

        .alert-error {
            background-color: rgba(220, 53, 69, 0.1);
            border: 1px solid #dc3545;
            color: #ff6b6b;
        }

        .alert-success {
            background-color: rgba(40, 167, 69, 0.1);
            border: 1px solid #28a745;
            color: #51cf66;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .password-hint {
            font-size: 12px;
            color: #9aa3b2;
            margin-top: 5px;
        }

        /* High Contrast Mode */
        .high-contrast .password-card {
            background-color: rgb(20, 20, 20);
            border-color: rgb(70, 70, 70);
            border-width: 2px;
            color: rgb(255, 255, 255);
        }

        .high-contrast .password-card h1 {
            color: rgb(255, 255, 255);
            border-bottom-color: rgb(0, 102, 204);
        }

        .high-contrast .form-group label {
            color: rgb(255, 255, 255);
        }

        .high-contrast .form-group input {
            background-color: rgb(30, 30, 30);
            border-color: rgb(70, 70, 70);
            color: rgb(255, 255, 255);
        }

        .high-contrast .form-group input:focus {
            border-color: rgb(0, 102, 204);
            box-shadow: 0 0 8px rgba(0, 102, 204, 0.3);
        }

        .high-contrast .form-group input::placeholder {
            color: rgb(150, 150, 150);
        }

        .high-contrast .password-hint {
            color: rgb(150, 150, 150);
        }

        .high-contrast .btn-submit {
            background: rgb(0, 102, 204);
            color: rgb(255, 255, 255);
        }

        .high-contrast .btn-submit:hover {
            background: rgb(0, 80, 160);
        }

        .high-contrast .btn-cancel {
            background: rgb(100, 100, 100);
            color: rgb(255, 255, 255);
        }

        .high-contrast .btn-cancel:hover {
            background: rgb(80, 80, 80);
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <h1>MiniDiscDB</h1>

            <a href="/" class="btn btn-ghost">Home</a>
            <a href="/collections" class="btn btn-ghost">Collections</a>
            <a href="/database" class="btn btn-ghost">Database</a>

            {% if user['username'] %}
            <a href="/user" class="btn btn-secondary">Profile</a>
            <a href="/logout" class="btn btn-secondary logout">Logout</a>
            {% endif %}
        </nav>
    </header>

    <div class="password-container">
        <div class="password-card">
            <h1>Change Password</h1>

            {% if error %}
            <div class="alert alert-error">
                {{ error }}
            </div>
            {% endif %}

            {% if success %}
            <div class="alert alert-success">
                {{ success }}
            </div>
            {% endif %}

            <form method="POST" class="password-form">
                <div class="form-group">
                    <label for="old_password">Current Password</label>
                    <input 
                        type="password" 
                        id="old_password" 
                        name="old_password" 
                        required 
                        placeholder="Enter your current password"
                    >
                </div>

                <div class="form-group">
                    <label for="new_password">New Password</label>
                    <input 
                        type="password" 
                        id="new_password" 
                        name="new_password" 
                        required 
                        placeholder="Enter your new password"
                    >
                    <div class="password-hint">Minimum 6 characters</div>
                </div>

                <div class="form-group">
                    <label for="confirm_password">Confirm New Password</label>
                    <input 
                        type="password" 
                        id="confirm_password" 
                        name="confirm_password" 
                        required 
                        placeholder="Confirm your new password"
                    >
                </div>

                <div class="form-buttons">
                    <button type="submit" class="btn btn-submit">Change Password</button>
                    <a href="/user"><button type="button" class="btn btn-cancel">Cancel</button></a>
                </div>
            </form>
        </div>
    </div>

    <button id="highcontrast-btn">Enable High Contrast</button>
</body>
</html>
