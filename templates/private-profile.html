<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='images/icon-192.png') }}">
    <link rel="stylesheet" href="../static/style.css">
    <title>Private Profile - MiniDiscDB</title>
    <script src="../static/animation.js"></script>
    <style>
        .profile-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .profile-header {
            background: linear-gradient(135deg, #1e1e1e 0%, #2d2d2d 100%);
            border: 1px solid #444;
            border-radius: 12px;
            padding: 40px 30px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .profile-picture {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background-color: #444;
            border: 3px solid #007bff;
            object-fit: cover;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-size: 60px;
        }

        .profile-picture img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-info h2 {
            margin: 0 0 10px 0;
            font-size: 32px;
            color: #fff;
        }

        .profile-info p {
            margin: 5px 0;
            color: #aaa;
            font-size: 16px;
        }

        .profile-info .member-date {
            color: #007bff;
            font-weight: bold;
            margin-top: 10px;
        }

        .profile-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .profile-card {
            background: #1e1e1e;
            border: 1px solid #444;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .profile-card h3 {
            margin: 0 0 20px 0;
            font-size: 22px;
            color: #fff;
            border-bottom: 2px solid #007bff;
            padding-bottom: 10px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #333;
        }

        .stat-item:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: #aaa;
            font-size: 14px;
        }

        .stat-value {
            color: #007bff;
            font-size: 24px;
            font-weight: bold;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .action-buttons .btn {
            text-align: center;
            margin: 0;
            padding: 12px 20px;
            width: 100%;
        }

        .collections-grid {
            display: flex;
            gap: 40px;
            overflow-x: auto;
            padding: 12px 8px 18px;
            scroll-behavior: smooth;
            flex-wrap: nowrap;
            align-items: stretch;
        }

        .collection-item {
            background: #2d2d2d;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            flex-shrink: 0;
            width: 150px;
        }

        .collection-item:hover {
            border-color: #007bff;
            box-shadow: 0 4px 12px rgba(0, 123, 255, 0.2);
            transform: translateY(-2px);
        }

        .collection-item .count {
            font-size: 24px;
            font-weight: bold;
            color: #007bff;
        }

        .collection-item .name {
            color: #aaa;
            font-size: 12px;
            margin-top: 8px;
            word-break: break-word;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .settings-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #2d2d2d;
            border-radius: 8px;
            border: 1px solid #333;
        }

        .setting-label {
            color: #fff;
            font-weight: 600;
        }

        .setting-value {
            color: #007bff;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .profile-content {
                grid-template-columns: 1fr;
            }

            .profile-header {
                flex-direction: column;
                text-align: center;
            }

            .profile-picture {
                width: 120px;
                height: 120px;
            }

            .profile-info h2 {
                font-size: 24px;
            }
        }

        /* Form Input Styles for Modals */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #fff;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #444;
            border-radius: 8px;
            background-color: #2d2d2d;
            color: #fff;
            font-family: Arial, sans-serif;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 8px rgba(0, 123, 255, 0.3);
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            animation: fadeIn 0.3s ease;
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: #1e1e1e;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #444;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            width: 90%;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 2px solid #007bff;
            padding-bottom: 15px;
        }

        .modal-header h2 {
            margin: 0;
            color: #fff;
            font-size: 24px;
        }

        .close-btn {
            background: none;
            border: none;
            color: #aaa;
            font-size: 28px;
            cursor: pointer;
            transition: color 0.3s ease;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            color: #007bff;
        }

        .modal-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .modal-form label {
            color: #fff;
            font-weight: 600;
        }

        .file-input-wrapper {
            position: relative;
        }

        .file-input-wrapper input[type="file"] {
            display: none;
        }

        .file-input-label {
            display: block;
            padding: 15px 20px;
            background: #2d2d2d;
            border: 2px dashed #007bff;
            border-radius: 8px;
            text-align: center;
            color: #007bff;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .file-input-label:hover {
            background: #333;
            border-color: #0056b3;
        }

        #previewImg {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            margin: 15px 0 0 0;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .modal-buttons button[type="submit"] {
            background: #007bff;
            color: #fff;
        }

        .modal-buttons button[type="submit"]:hover {
            background: #0056b3;
            transform: translateY(-2px);
        }

        .modal-buttons button.cancel-btn {
            background: #6c757d;
            color: #fff;
        }

        .modal-buttons button.cancel-btn:hover {
            background: #5a6268;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <h1>MiniDiscDB</h1>

            <a href="/" class="btn btn-ghost">Home</a>

            <a href="/collections" class="btn btn-ghost">Collections</a>

            <a href="/database" class="btn btn-ghost">Database</a>

            {% if not user['username'] %}
            <a href="/login" class="btn btn-primary">Login</a>
            {% endif %}

            {% if user['username'] %}
            <a href="/user" class="btn btn-secondary">Profile</a>
            <a href="/logout" class="btn btn-secondary logout">Logout</a>
            {% endif %}
        </nav>
    </header>
    <main>
    <div class="profile-container">
        <!-- Profile Header -->
        <div class="profile-header">
            <div class="profile-picture">
                <span>👤</span>
            </div>
            <div class="profile-info">

                {% if message == 67 %}
                <h2>This account does not exist</h2>
                {% elif message == 0 %}
                <h2>This account has been set to private</h2>
                {% endif %}

                <p>No email</p>
                <p>MiniDisc Enthusiast</p>
                <p class="member-date"></p>
            </div>
        </div>
    </main>
    <button id="highcontrast-btn">Toggle High Contrast</button>

</body>
</html>
